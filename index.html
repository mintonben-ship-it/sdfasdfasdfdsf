<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">

<base href="https://rawcdn.githack.com/mintonben-ship-it/123/main/">

<title>Snow Rider 3D</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#060606;
  color:white;
  overflow:hidden;
  font-family:Arial;
}

#loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#000,#012233);
  z-index:999;
}

h1{
  font-size:2.5em;
  margin-bottom:20px;
  text-shadow:0 0 10px #00ffff;
}

.bar{
  width:300px;
  height:10px;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ffff,#0083ff);
  animation:load 3s ease forwards;
}

@keyframes load{
  from{width:0%;}
  to{width:100%;}
}

#gameContainer{
  width:100%;
  height:100%;
}
</style>

<!-- IMPORTANT: ONLY ONE LOADER SCRIPT -->
<script src="Build/SnowRider3D-gd-1.loader.js"></script>

</head>

<body>

<!-- LOADER -->
<div id="loader">
  <h1>Snow Rider 3D</h1>
  <div class="bar">
    <div class="progress"></div>
  </div>
</div>

<!-- GAME -->
<div id="gameContainer"></div>

<script>
let gameInstance;

// wait until page fully loads
window.onload = function() {

  setTimeout(() => {

    document.getElementById("loader").remove();

    // THIS is the correct Unity WebGL loader call
    gameInstance = createUnityInstance(document.querySelector("#gameContainer"), {
      dataUrl: "Build/SnowRider3D-gd-1.data.unityweb",
      frameworkUrl: "Build/SnowRider3D-gd-1.wasm.framework.unityweb",
      codeUrl: "Build/SnowRider3D-gd-1.wasm.code.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Snow Rider",
      productName: "Snow Rider 3D",
      productVersion: "1.0"
    });

  }, 3000);

};
</script>

</body>
</html>
