<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">

<base href="https://rawcdn.githack.com/mintonben-ship-it/123/main/">

<title>Snow Rider 3D</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#060606;
  color:white;
  overflow:hidden;
  font-family:Arial;
}

/* LOADER SCREEN */
#loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#000,#012233);
  z-index:999;
}

h1{
  font-size:2.5em;
  margin-bottom:20px;
  text-shadow:0 0 10px #00ffff;
}

/* BAR */
.bar{
  width:300px;
  height:10px;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
}

/* PROGRESS */
.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00ffff,#0083ff);
  animation:load 3s ease forwards;
}

@keyframes load{
  from{width:0%;}
  to{width:100%;}
}

/* GAME */
#gameContainer{
  width:100%;
  height:100%;
}
</style>

<script src="TemplateData/UnityProgress.js"></script>
<script src="Build/UnityLoader.js"></script>

</head>

<body>

<!-- LOADING SCREEN -->
<div id="loader">
  <h1>Snow Rider 3D</h1>
  <div class="bar">
    <div class="progress"></div>
  </div>
</div>

<!-- GAME -->
<div id="gameContainer"></div>

<script>
setTimeout(()=>{

  // remove loader
  document.getElementById("loader").remove();

  // start game
  var gameInstance = UnityLoader.instantiate(
    "gameContainer",
    "Build/SnowRider3D-gd-1.json",
    {
      onProgress: UnityProgress,
      Module:{
        onRuntimeInitialized: function(){
          UnityProgress(gameInstance, "complete");
        }
      }
    }
  );

},3000);
</script>

</body>
</html>
